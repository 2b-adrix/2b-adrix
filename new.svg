<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes neonPulse {
        0%,100%{filter:drop-shadow(0 0 5px #3DDC84) drop-shadow(0 0 10px #3DDC84);opacity:1}
        50%{filter:drop-shadow(0 0 10px #3DDC84) drop-shadow(0 0 20px #FF3D3D);opacity:.6}
      }

      @keyframes floatFragmented{
        0%,100%{transform:translateY(0) rotate(0)}
        50%{transform:translateY(-15px) rotate(3deg)}
      }

      @keyframes textGlitch{
        0%{transform:translate(0)}
        25%{transform:translate(-2px,2px)}
        50%{transform:translate(2px,-2px)}
        75%{transform:translate(-1px,0)}
        100%{transform:translate(0)}
      }

      @keyframes energyConnect{
        0%{stroke-dashoffset:0}
        50%{stroke-dashoffset:30}
        100%{stroke-dashoffset:0}
      }

      @keyframes legGlitch{
        0%,90%{transform:translate(0,0)}
        95%{transform:translate(-8px,5px) skewX(20deg)}
        100%{transform:translate(0,0)}
      }

      @keyframes fallingCode{
        0%{transform:translateY(-40px);opacity:0}
        20%{opacity:.8}
        80%{opacity:.8}
        100%{transform:translateY(420px);opacity:0}
      }

      .cyber-glow{animation:neonPulse 1.5s infinite}
      .fragment{animation:floatFragmented 4s ease-in-out infinite}
      .glitch-text{animation:textGlitch .4s steps(2) infinite;fill:#fff;font-family:monospace;font-size:10px}
      .energy-line{stroke:#3DDC84;stroke-width:1.5;fill:none;stroke-dasharray:10 10;animation:energyConnect .8s linear infinite}
      .base-text{fill:#3DDC84;font-family:monospace;font-size:14px;font-weight:bold}

      .glitch-leg{animation:legGlitch 2s infinite}
      .falling-ascii{animation:fallingCode 4s linear infinite;fill:#3DDC84;opacity:.25;font-family:monospace;font-size:8px}
    </style>

    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F12"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#cyberGrad)" rx="10"/>

  <!-- falling code -->
  <g transform="translate(300,0)">
    <text class="falling-ascii" x="0" y="0">1010?</text>
    <text class="falling-ascii" x="-30" y="0" style="animation-delay:1s">&lt;/&gt;</text>
    <text class="falling-ascii" x="20" y="0" style="animation-delay:2s">val</text>
  </g>

  <!-- energy lines -->
  <g class="energy-line">
    <path d="M100,200 C150,150 250,250 300,200"/>
    <path d="M500,200 C450,250 350,150 300,200"/>
  </g>

  <!-- floating terminal -->
  <g transform="translate(100,250)">
    <g class="fragment">
      <path d="M0,50 L150,75 L300,50 L150,0 Z" fill="#1A1C1E" stroke="#3DDC84" stroke-width="1.5" class="cyber-glow"/>
      <text x="75" y="45" class="glitch-text">ADB_SHELL_CONNECTED</text>
      <text x="75" y="60" class="glitch-text">root@android_dev:/ #</text>
    </g>
  </g>

  <!-- Android robot -->
  <g class="cyber-glow" transform="translate(260,100)">
    
    <!-- head -->
    <path d="M0,60 A40,40 0 0 1 80,60 Z" fill="#3DDC84"/>

    <!-- eyes -->
    <rect x="10" y="40" width="25" height="18" rx="2" fill="#111" stroke="#FFF"/>
    <rect x="45" y="40" width="25" height="18" rx="2" fill="#111" stroke="#FF3D3D"/>
    <circle cx="22.5" cy="49" r="3" fill="#3DDC84"/>
    <text x="50" y="52" class="glitch-text" font-size="8">ALERT</text>

    <!-- antennas -->
    <line x1="15" y1="15" x2="25" y2="35" stroke="#3DDC84" stroke-width="4"/>
    <path d="M75,15 C85,25 65,35 65,35" stroke="#FF3D3D" stroke-width="4" fill="none"/>

    <!-- body -->
    <rect x="0" y="65" width="80" height="70" rx="10" fill="#3DDC84"/>

    <!-- arms -->
    <rect x="-20" y="65" width="15" height="55" rx="7.5" fill="#3DDC84"/>
    <rect x="85" y="65" width="15" height="55" rx="7.5" fill="#3DDC84"/>

    <!-- legs -->
    <g class="glitch-leg">
      <rect x="15" y="135" width="15" height="35" rx="7" fill="#3DDC84" stroke="#FF3D3D"/>
    </g>

    <g class="glitch-leg" style="animation-delay:0.6s">
      <rect x="50" y="135" width="15" height="35" rx="7" fill="#3DDC84" stroke="#FF3D3D"/>
    </g>

    <!-- ground energy -->
    <ellipse cx="40" cy="175" rx="40" ry="8" fill="#FF3D3D" opacity="0.25"/>

  </g>

  <!-- footer -->
  <g transform="translate(300,360)">
    <text text-anchor="middle" class="base-text">[[ SYSTEM_STATUS: OVERLOAD ]]</text>
    <text y="15" text-anchor="middle" class="glitch-text">#j4ck1ng_1nt0_th3_m4tr1x</text>
  </g>

</svg>
